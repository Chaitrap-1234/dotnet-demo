name: .NET CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build:

    runs-on: self-hosted

    steps:

      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4


      # Debug workspace
      - name: Show Workspace
        run: |
          pwd
          ls -la
          find . -name "*.csproj"


      # Verify installed .NET
      # No setup-dotnet required because self-hosted runner already has .NET 8
      - name: Check .NET Version
        run: |
          dotnet --version
          dotnet --info


      # Restore NuGet packages
      - name: Restore Packages
        run: |
          dotnet restore dotnet-demo.sln


      # Lint / Formatting check
      - name: Run Lint
        continue-on-error: true
        run: |
          dotnet format dotnet-demo.sln --verify-no-changes


      # Build application
      - name: Build Project
        run: |
          dotnet build dotnet-demo.sln \
            --configuration Release \
            --no-restore


      # Run Unit Tests
      - name: Run Unit Tests
        continue-on-error: true
        run: |
          rm -rf TestResults
          mkdir TestResults

          dotnet test dotnet-demo.sln \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults

          echo "Generated test result files:"
          find . -name "*.trx" -print


      # Publish test result inside GitHub Actions
      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: "TestResults/*.trx"
          reporter: dotnet-trx


      # Run application
      - name: Run Application
        run: |
          dotnet run \
            --project dotnet-demo.csproj \
            --configuration Release


      # Create standalone executable
      - name: Publish Executable
        run: |
          dotnet publish dotnet-demo.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output publish


      # Verify executable
      - name: Verify Executable
        run: |
          ls -lh publish
          file publish/*


      # Upload executable artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-demo-linux-x64
          path: publish/
